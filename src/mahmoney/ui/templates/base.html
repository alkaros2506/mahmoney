<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mahmoney - {% block title %}Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        [hx-indicator] .htmx-indicator { display: none; }
        [hx-indicator].htmx-request .htmx-indicator { display: inline; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-6">
            <a href="/" class="text-xl font-bold text-gray-900">mahmoney</a>
            <a href="/" class="text-sm text-gray-600 hover:text-gray-900">Dashboard</a>
            <a href="/expenses" class="text-sm text-gray-600 hover:text-gray-900">Expenses</a>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
